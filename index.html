<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Green Area7 รายงานประจำสัปดาห์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --gold: #e9c46a;
    --gold-dark: #c9a84c;
    --cream: #f8f4e8;
    --white: #ffffff;
    --gray-light: #f0f0ec;
    --gray: #8a8a80;
    --text-dark: #1a1a18;
    --text-mid: #3a3a35;
    --danger: #c0392b;
    --danger-light: #fde8e6;
    --shadow: 0 4px 24px rgba(26,58,42,0.10);
    --shadow-lg: 0 8px 40px rgba(26,58,42,0.16);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ─── LOGIN SCREEN ─── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--green-light) 100%);
    position: relative;
    overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .login-box {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text { font-size: 26px; font-weight: 700; color: var(--green-dark); letter-spacing: -0.5px; }
  .login-subtitle { font-size: 13px; color: var(--gray); letter-spacing: 0.5px; }
  .login-title { font-size: 17px; font-weight: 600; color: var(--text-mid); margin-top: 4px; }

  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid #e0e0d8; border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif; font-size: 15px; color: var(--text-dark);
    background: var(--gray-light);
    outline: none; transition: all 0.2s;
  }
  .form-group input:focus { border-color: var(--green-light); background: var(--white); box-shadow: 0 0 0 3px rgba(82,183,136,0.15); }

  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    color: var(--white); border: none; border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
    letter-spacing: 0.3px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,106,79,0.35); }
  .btn-login:active { transform: none; }

  .login-error {
    background: var(--danger-light); color: var(--danger);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; font-weight: 500; margin-top: 12px;
    display: none;
  }

  /* ─── APP LAYOUT ─── */
  #app { display: none; min-height: 100vh; }

  .topbar {
    background: var(--green-dark);
    color: var(--white);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo img { height: 36px; display: block; border-radius: 6px; }
  .login-logo img { border-radius: 8px; }
  .topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
  .topbar-page { font-size: 14px; color: var(--green-pale); font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.85);
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--green-dark);
  }
  .btn-logout {
    padding: 6px 14px; background: rgba(255,255,255,0.12);
    color: var(--white); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; font-family: 'Sarabun', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.22); }

  /* ─── NAV TABS ─── */
  .nav-bar {
    background: var(--white);
    border-bottom: 1px solid #e8e8e0;
    padding: 0 32px;
    display: flex; gap: 4px;
    overflow-x: auto;
  }
  .nav-tab {
    padding: 14px 18px; font-size: 14px; font-weight: 500;
    color: var(--gray); border: none; background: none;
    cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; font-family: 'Sarabun', sans-serif;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-tab:hover { color: var(--green-mid); }
  .nav-tab.active { color: var(--green-mid); border-bottom-color: var(--green-mid); font-weight: 600; }

  /* ─── MAIN CONTENT ─── */
  .main-content { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  /* ─── FORM CARD ─── */
  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    margin-bottom: 24px;
  }
  .card-header {
    padding: 20px 24px; border-bottom: 1px solid #f0f0ea;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 16px; font-weight: 700; color: var(--green-dark); }
  .card-subtitle { font-size: 13px; color: var(--gray); margin-top: 2px; }
  .card-body { padding: 24px; }

  .week-selector {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .week-selector label { font-size: 14px; font-weight: 600; color: var(--text-mid); white-space: nowrap; }
  .week-selector input[type="date"] {
    padding: 9px 14px; border: 1.5px solid #e0e0d8;
    border-radius: var(--radius-sm); font-family: 'Sarabun', sans-serif;
    font-size: 14px; color: var(--text-dark); background: var(--gray-light);
    outline: none; cursor: pointer;
  }
  .week-selector input[type="date"]:focus { border-color: var(--green-light); background: var(--white); }

  /* ─── REPORT TABLE ─── */
  .report-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .section-label {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--green-mid);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--green-pale); }

  .fields-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px;
  }

  .field-item label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-mid); margin-bottom: 5px;
  }
  .field-item input, .field-item textarea, .field-item select {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #e0e0d8; border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text-dark);
    background: var(--gray-light); outline: none; transition: all 0.2s;
  }
  .field-item input:focus, .field-item textarea:focus, .field-item select:focus {
    border-color: var(--green-light); background: var(--white);
    box-shadow: 0 0 0 3px rgba(82,183,136,0.12);
  }
  .field-item textarea { resize: vertical; min-height: 80px; }
  .field-item.full { grid-column: 1 / -1; }

  .unit-input { position: relative; }
  .unit-input input { padding-right: 40px; }
  .unit-label {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: var(--gray); font-family: 'IBM Plex Mono', monospace;
    pointer-events: none;
  }

  .btn-submit {
    padding: 13px 32px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    color: var(--white); border: none; border-radius: var(--radius-sm);
    font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,106,79,0.3); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .submit-status {
    padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; margin-top: 16px; display: none;
  }
  .submit-status.success { background: #e8f5e9; color: #2e7d32; }
  .submit-status.error { background: var(--danger-light); color: var(--danger); }
  .submit-status.loading { background: #e3f2fd; color: #1565c0; }

  /* ─── DASHBOARD (MANAGER VIEW) ─── */
  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px;
    border-left: 4px solid var(--green-light);
  }
  .summary-card.gold { border-left-color: var(--gold); }
  .summary-card.danger { border-left-color: var(--danger); }
  .summary-card-label { font-size: 12px; color: var(--gray); font-weight: 500; margin-bottom: 6px; }
  .summary-card-value { font-size: 26px; font-weight: 700; color: var(--green-dark); font-family: 'IBM Plex Mono', monospace; }
  .summary-card-unit { font-size: 13px; color: var(--gray); margin-left: 4px; }
  .summary-card-sub { font-size: 12px; color: var(--green-mid); margin-top: 4px; font-weight: 500; }

  /* ─── BRANCH STATUS TABLE ─── */
  .branch-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
  .branch-table th {
    background: var(--green-dark); color: var(--white);
    padding: 12px 16px; font-weight: 600; font-size: 12px;
    letter-spacing: 0.5px; text-align: left;
  }
  .branch-table th:first-child { border-radius: 8px 0 0 0; }
  .branch-table th:last-child { border-radius: 0 8px 0 0; }
  .branch-table td {
    padding: 13px 16px; border-bottom: 1px solid #f0f0ea;
    vertical-align: middle;
  }
  .branch-table tr:last-child td { border-bottom: none; }
  .branch-table tr:hover td { background: var(--gray-light); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .status-badge.submitted { background: #e8f5e9; color: #2e7d32; }
  .status-badge.pending { background: #fff8e1; color: #f57f17; }
  .status-badge::before { content: '●'; font-size: 8px; }

  .num-mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  .branch-name-cell { font-weight: 600; color: var(--green-dark); }
  .branch-code { font-size: 11px; color: var(--gray); font-family: 'IBM Plex Mono', monospace; }

  /* ─── HISTORY ─── */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    background: var(--white); border-radius: var(--radius-sm);
    padding: 16px 20px; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.2s;
    border: 1.5px solid transparent;
  }
  .history-item:hover { border-color: var(--green-pale); transform: translateX(3px); }
  .history-item-left { display: flex; align-items: center; gap: 14px; }
  .history-week-badge {
    background: var(--green-dark); color: var(--white);
    border-radius: 8px; padding: 8px 12px; text-align: center;
    min-width: 80px;
  }
  .history-week-badge .wk { font-size: 11px; color: var(--green-pale); }
  .history-week-badge .wknum { font-size: 18px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .history-meta { font-size: 13px; color: var(--gray); margin-top: 3px; }
  .history-value { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--green-dark); }
  .history-value-label { font-size: 12px; color: var(--gray); text-align: right; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--gray);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.4s ease; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 16px;
    padding: 32px; max-width: 600px; width: 90%;
    box-shadow: var(--shadow-lg); animation: fadeUp 0.3s ease;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--green-dark); margin-bottom: 20px; }
  .modal-close {
    float: right; background: none; border: none; font-size: 20px;
    cursor: pointer; color: var(--gray); margin-top: -4px;
  }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0ea; font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--gray); }
  .detail-value { font-weight: 600; color: var(--text-dark); font-family: 'IBM Plex Mono', monospace; }

  /* ─── SETUP NOTICE ─── */
  .setup-notice {
    background: linear-gradient(135deg, #fff8e1, #fff3cd);
    border: 1.5px solid var(--gold);
    border-radius: var(--radius); padding: 16px 20px;
    margin-bottom: 20px; font-size: 13px; color: #7d5a00;
  }
  .setup-notice strong { display: block; margin-bottom: 4px; font-size: 14px; }

  /* Responsive */
  @media (max-width: 640px) {
    .main-content { padding: 16px; }
    .topbar { padding: 0 16px; }
    .nav-bar { padding: 0 16px; }
    .fields-grid { grid-template-columns: 1fr; }
    .login-box { padding: 32px 24px; }
    .topbar-page { display: none; }
  }
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">
        <img src="Beyond_Green_Logo_Stroke.png" alt="Beyond Green" style="height:60px;border-radius:8px;background:#000;padding:6px 12px">
      </div>
      <div class="login-subtitle">ระบบรายงานประจำสัปดาห์</div>
      <div class="login-title">กรุณาเข้าสู่ระบบ</div>
    </div>
    <div class="form-group">
      <label>ชื่อผู้ใช้</label>
      <input type="text" id="login-user" placeholder="username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-error" id="login-error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><img src="Beyond_Green_Logo_Stroke.png" alt="Beyond Green" style="background:#000;border-radius:6px;padding:3px 8px"></div>
      <div class="topbar-divider"></div>
      <div class="topbar-page" id="topbar-page">รายงานประจำสัปดาห์</div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">N</div>
        <span id="user-display"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-bar" id="nav-bar"></div>

  <!-- Content -->
  <div class="main-content fade-in" id="main-content"></div>
</div>

<!-- ═══════════════════ DETAIL MODAL ═══════════════════ -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">รายละเอียดรายงาน</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG — แก้ไข APPS_SCRIPT_URL หลังจากติดตั้ง Google Apps Script
// ════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

// ════════════════════════════════════════════════════════
// USER DATABASE
// ════════════════════════════════════════════════════════
const USERS = {
  'natthareeya': { pass: '12345', role: 'manager', name: 'Natthareeya', branch: null,   branchName: 'ผู้จัดการเขต' },
  'pongganin':   { pass: '12345', role: 'manager', name: 'Pongganin',   branch: null,   branchName: 'ผู้จัดการเขต' },
  'sittinan':    { pass: '54321', role: 'branch',  name: 'Sittinan',    branch: 'PKT',  branchName: 'สาขาภูเก็ต' },
  'narinthorn':  { pass: '54321', role: 'branch',  name: 'Narinthorn',  branch: 'SMI',  branchName: 'สาขาสมุย' },
  'suthee.p':    { pass: '54321', role: 'branch',  name: 'Suthee P.',   branch: 'KBI',  branchName: 'สาขากระบี่' },
  'prachya':     { pass: '54321', role: 'branch',  name: 'Prachya',     branch: 'HDY',  branchName: 'สาขาหาดใหญ่' },
};

const BRANCHES = {
  'PKT': { name: 'สาขาภูเก็ต',  code: 'PKT', color: '#0ea5e9' },
  'SMI': { name: 'สาขาสมุย',    code: 'SMI', color: '#8b5cf6' },
  'KBI': { name: 'สาขากระบี่',  code: 'KBI', color: '#f59e0b' },
  'HDY': { name: 'สาขาหาดใหญ่', code: 'HDY', color: '#10b981' },
};

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let currentUser = null;
let currentTab = 'report';
let allReports = [];

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { username: u, ...USERS[u] };
    err.style.display = 'none';
    showApp();
  } else {
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = `${currentUser.name} · ${currentUser.branchName}`;
  document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();

  buildNav();
  if (currentUser.role === 'manager') {
    currentTab = 'dashboard';
    loadReports();
  } else {
    currentTab = 'report';
    renderTab();
  }
}

// ════════════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('nav-bar');
  let tabs = [];
  if (currentUser.role === 'manager') {
    tabs = [
      { id: 'dashboard', label: '📊 ภาพรวม' },
      { id: 'history',   label: '📋 ประวัติรายงาน' },
    ];
  } else {
    tabs = [
      { id: 'report',  label: '📝 กรอกรายงาน' },
      { id: 'history', label: '📋 ประวัติของสาขา' },
    ];
  }
  nav.innerHTML = tabs.map(t =>
    `<button class="nav-tab ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(
      tab === 'dashboard' ? 'ภาพรวม' : tab === 'history' ? 'ประวัติ' : 'กรอก'
    ));
  });
  renderTab();
}

// ════════════════════════════════════════════════════════
// RENDER TABS
// ════════════════════════════════════════════════════════
function renderTab() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = '';
  mc.classList.remove('fade-in');
  void mc.offsetWidth;
  mc.classList.add('fade-in');

  if (currentTab === 'report') renderReportForm();
  else if (currentTab === 'dashboard') renderDashboard();
  else if (currentTab === 'history') renderHistory();
}

function getWeekRange(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
  return `${fmt(mon)} – ${fmt(sun)}`;
}

function getWeekNumber(dateStr) {
  const d = new Date(dateStr);
  const startOfYear = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
}

function updateWeekLabel() {
  const d = document.getElementById('week-date')?.value;
  if (!d) return;
  document.getElementById('week-label').textContent = `สัปดาห์: ${getWeekRange(d)}`;
  document.getElementById('week-range-display').textContent = getWeekRange(d);
}

function clearForm() {
  ['f-total-sale','f-units-sold','f-target','f-monthly-acc','f-new-cust','f-leads','f-testdrive','f-delivery','f-activities','f-issues','f-plan']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
}

async function submitReport() {
  const dateVal = document.getElementById('week-date').value;
  if (!dateVal) { showStatus('กรุณาเลือกวันที่', 'error'); return; }

  const payload = {
    action: 'submit',
    branch: currentUser.branch,
    branchName: currentUser.branchName,
    username: currentUser.username,
    weekDate: dateVal,
    weekRange: getWeekRange(dateVal),
    weekNumber: getWeekNumber(dateVal),
    year: new Date(dateVal).getFullYear(),
    totalSale: document.getElementById('f-total-sale').value || 0,
    unitsSold: document.getElementById('f-units-sold').value || 0,
    target: document.getElementById('f-target').value || 0,
    monthlyAcc: document.getElementById('f-monthly-acc').value || 0,
    newCustomers: document.getElementById('f-new-cust').value || 0,
    leads: document.getElementById('f-leads').value || 0,
    testDrive: document.getElementById('f-testdrive').value || 0,
    delivery: document.getElementById('f-delivery').value || 0,
    activities: document.getElementById('f-activities').value || '',
    issues: document.getElementById('f-issues').value || '',
    plan: document.getElementById('f-plan').value || '',
    submittedAt: new Date().toISOString(),
  };

  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showStatus('⚠️ ยังไม่ได้ตั้งค่า Apps Script URL — กรุณาดูคู่มือการติดตั้ง', 'error');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('⏳ กำลังส่งข้อมูล...', 'loading');

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      showStatus('✅ ส่งรายงานเรียบร้อยแล้ว! (' + new Date().toLocaleString('th-TH') + ')', 'success');
      clearForm();
    } else {
      showStatus('❌ เกิดข้อผิดพลาด: ' + (data.message || 'unknown'), 'error');
    }
  } catch (e) {
    showStatus('❌ ไม่สามารถเชื่อมต่อได้: ' + e.message, 'error');
  }
  btn.disabled = false;
}

function showStatus(msg, type) {
  const el = document.getElementById('submit-status');
  el.textContent = msg;
  el.className = 'submit-status ' + type;
  el.style.display = 'block';
}

// ════════════════════════════════════════════════════════
// DASHBOARD (MANAGER)
// ════════════════════════════════════════════════════════
async function loadReports() {
  if (APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getAll`);
      const data = await res.json();
      allReports = data.reports || [];
    } catch (e) { allReports = []; }
  }
  renderTab();
}

function renderDashboard() {
  // Get latest report per branch
  const latestByBranch = {};
  allReports.forEach(r => {
    if (!latestByBranch[r.branch] || r.submittedAt > latestByBranch[r.branch].submittedAt) {
      latestByBranch[r.branch] = r;
    }
  });

  const totalSale = Object.values(latestByBranch).reduce((s, r) => s + (+r.totalSale || 0), 0);
  const totalUnits = Object.values(latestByBranch).reduce((s, r) => s + (+r.unitsSold || 0), 0);
  const submitted = Object.keys(latestByBranch).length;

  document.getElementById('main-content').innerHTML = `
    ${APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE' ? `
    <div class="setup-notice">
      ⚠️ <strong>Demo Mode — ยังไม่ได้เชื่อมต่อ Google Sheets</strong>
      ข้อมูลด้านล่างเป็นตัวอย่าง กรุณาทำตามคู่มือการตั้งค่าก่อน
    </div>` : ''}
    <div class="summary-cards">
      <div class="summary-card">
        <div class="summary-card-label">ยอดขายรวมทุกสาขา</div>
        <div class="summary-card-value">${totalSale > 0 ? (totalSale/1000000).toFixed(2) : '—'}<span class="summary-card-unit">ล้านบาท</span></div>
        <div class="summary-card-sub">สัปดาห์ล่าสุดที่รายงาน</div>
      </div>
      <div class="summary-card gold">
        <div class="summary-card-label">จำนวนรถขายได้รวม</div>
        <div class="summary-card-value">${totalUnits > 0 ? totalUnits : '—'}<span class="summary-card-unit">คัน</span></div>
        <div class="summary-card-sub">รวมทุกสาขา</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">สาขาที่ส่งรายงานแล้ว</div>
        <div class="summary-card-value">${submitted}<span class="summary-card-unit">/ 4</span></div>
        <div class="summary-card-sub">สัปดาห์ล่าสุด</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">สถานะรายงานแต่ละสาขา</div>
          <div class="card-subtitle">ข้อมูลล่าสุดที่แต่ละสาขาส่งมา</div>
        </div>
        <button onclick="loadReports()" style="padding:8px 16px;background:var(--green-dark);color:white;border:none;border-radius:8px;font-family:Sarabun,sans-serif;font-size:13px;cursor:pointer">🔄 รีเฟรช</button>
      </div>
      <div class="card-body" style="padding:0">
        <table class="branch-table">
          <thead>
            <tr>
              <th>สาขา</th>
              <th>สัปดาห์ล่าสุด</th>
              <th>ยอดขาย (฿)</th>
              <th>รถ (คัน)</th>
              <th>Leads</th>
              <th>สถานะ</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${Object.values(BRANCHES).map(b => {
              const r = latestByBranch[b.code];
              return `<tr>
                <td>
                  <div class="branch-name-cell">${b.name}</div>
                  <div class="branch-code">${b.code}</div>
                </td>
                <td class="num-mono">${r ? r.weekRange : '—'}</td>
                <td class="num-mono">${r ? Number(r.totalSale).toLocaleString() : '—'}</td>
                <td class="num-mono">${r ? r.unitsSold : '—'}</td>
                <td class="num-mono">${r ? r.leads : '—'}</td>
                <td><span class="status-badge ${r ? 'submitted' : 'pending'}">${r ? 'ส่งแล้ว' : 'รอรายงาน'}</span></td>
                <td>${r ? `<button onclick='showDetail(${JSON.stringify(r)})' style="padding:5px 12px;background:none;border:1.5px solid var(--green-pale);border-radius:6px;font-family:Sarabun,sans-serif;font-size:12px;cursor:pointer;color:var(--green-mid)">ดูละเอียด</button>` : ''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════════════════════
function renderHistory() {
  let reports = allReports;
  if (currentUser.role === 'branch') {
    reports = reports.filter(r => r.branch === currentUser.branch);
  }
  reports = [...reports].sort((a, b) => b.submittedAt?.localeCompare(a.submittedAt));

  if (reports.length === 0) {
    document.getElementById('main-content').innerHTML = `
      ${APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE' ? `<div class="setup-notice">⚠️ <strong>ยังไม่ได้เชื่อมต่อ Google Sheets</strong> ประวัติรายงานจะแสดงหลังจากตั้งค่าเสร็จ</div>` : ''}
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">ยังไม่มีรายงาน</div>
        <div class="empty-sub">รายงานที่ส่งแล้วจะปรากฏที่นี่</div>
      </div>`;
    return;
  }

  document.getElementById('main-content').innerHTML = `
    <div class="history-list">
      ${reports.map(r => `
        <div class="history-item" onclick='showDetail(${JSON.stringify(r)})'>
          <div class="history-item-left">
            <div class="history-week-badge">
              <div class="wk">Week</div>
              <div class="wknum">${r.weekNumber || '—'}</div>
            </div>
            <div>
              <div style="font-weight:600;font-size:14px">${r.branchName || BRANCHES[r.branch]?.name || r.branch}</div>
              <div class="history-meta">${r.weekRange || r.weekDate} · ส่งโดย ${r.username}</div>
              <div class="history-meta">${new Date(r.submittedAt).toLocaleString('th-TH')}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="history-value">${Number(r.totalSale).toLocaleString()}</div>
            <div class="history-value-label">บาท · ${r.unitsSold} คัน</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ════════════════════════════════════════════════════════
// DETAIL MODAL
// ════════════════════════════════════════════════════════
function showDetail(r) {
  document.getElementById('modal-title').textContent =
    `${r.branchName || BRANCHES[r.branch]?.name} — ${r.weekRange || r.weekDate}`;
  document.getElementById('modal-body').innerHTML = `
    ${[
      ['สาขา', r.branchName || BRANCHES[r.branch]?.name],
      ['สัปดาห์', r.weekRange],
      ['ยอดขายรวม', Number(r.totalSale).toLocaleString() + ' บาท'],
      ['จำนวนรถที่ขาย', r.unitsSold + ' คัน'],
      ['เป้าสัปดาห์', Number(r.target).toLocaleString() + ' บาท'],
      ['ยอดสะสมเดือน', Number(r.monthlyAcc).toLocaleString() + ' บาท'],
      ['ลูกค้าใหม่', r.newCustomers + ' ราย'],
      ['Leads', r.leads + ' ราย'],
      ['Test Drive', r.testDrive + ' ครั้ง'],
      ['ส่งมอบรถ', r.delivery + ' คัน'],
      ['กิจกรรม', r.activities || '—'],
      ['ปัญหา', r.issues || '—'],
      ['แผนสัปดาห์หน้า', r.plan || '—'],
      ['ส่งโดย', r.username],
      ['เวลาที่ส่ง', new Date(r.submittedAt).toLocaleString('th-TH')],
    ].map(([k, v]) => `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${v}</span></div>`).join('')}
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
}
document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
